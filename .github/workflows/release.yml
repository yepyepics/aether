name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    env:
      COREPACK_ENABLE_STRICT: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Prepare sidecar directories
        shell: bash
        run: mkdir -p src-tauri/bin

      - name: Download yt-dlp for Windows
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          YTDLP_TAG=$(gh release view --repo yt-dlp/yt-dlp --json tagName -q .tagName)
          curl -fL "https://github.com/yt-dlp/yt-dlp/releases/download/${YTDLP_TAG}/yt-dlp.exe" \
            -o src-tauri/bin/yt-dlp-x86_64-pc-windows-msvc.exe

      - name: Download yt-dlp for macOS
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          YTDLP_TAG=$(gh release view --repo yt-dlp/yt-dlp --json tagName -q .tagName)
          curl -fL "https://github.com/yt-dlp/yt-dlp/releases/download/${YTDLP_TAG}/yt-dlp_macos" \
            -o src-tauri/bin/yt-dlp-x86_64-apple-darwin
          chmod +x src-tauri/bin/yt-dlp-x86_64-apple-darwin
          cp src-tauri/bin/yt-dlp-x86_64-apple-darwin src-tauri/bin/yt-dlp-aarch64-apple-darwin
          chmod +x src-tauri/bin/yt-dlp-aarch64-apple-darwin

      - name: Download yt-dlp for Linux
        if: matrix.os == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          YTDLP_TAG=$(gh release view --repo yt-dlp/yt-dlp --json tagName -q .tagName)
          curl -fL "https://github.com/yt-dlp/yt-dlp/releases/download/${YTDLP_TAG}/yt-dlp_linux" \
            -o src-tauri/bin/yt-dlp-x86_64-unknown-linux-gnu
          chmod +x src-tauri/bin/yt-dlp-x86_64-unknown-linux-gnu

      - name: Download ffmpeg for Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg-win64.zip"
          Expand-Archive -Path "ffmpeg-win64.zip" -DestinationPath "ffmpeg-win64"
          $ffmpeg = Get-ChildItem -Path "ffmpeg-win64" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          if (-not $ffmpeg) {
            throw "ffmpeg.exe was not found in the downloaded Windows archive."
          }
          Copy-Item $ffmpeg.FullName "src-tauri/bin/ffmpeg-x86_64-pc-windows-msvc.exe"

      - name: Download ffmpeg for macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          curl -L "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg-macos-x64.zip
          unzip -j ffmpeg-macos-x64.zip ffmpeg -d src-tauri/bin
          mv src-tauri/bin/ffmpeg src-tauri/bin/ffmpeg-x86_64-apple-darwin
          chmod +x src-tauri/bin/ffmpeg-x86_64-apple-darwin

          curl -L "https://github.com/eugeneware/ffmpeg-static/releases/latest/download/ffmpeg-darwin-arm64.gz" -o ffmpeg-darwin-arm64.gz
          gunzip -c ffmpeg-darwin-arm64.gz > src-tauri/bin/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/bin/ffmpeg-aarch64-apple-darwin

      - name: Download ffmpeg for Linux
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          curl -L "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -o ffmpeg-linux-amd64.tar.xz
          tar -xf ffmpeg-linux-amd64.tar.xz
          ffmpeg_dir="$(find . -maxdepth 1 -type d -name 'ffmpeg-*-amd64-static' | head -n 1)"
          if [ -z "$ffmpeg_dir" ]; then
            echo "Unable to locate extracted ffmpeg directory" >&2
            exit 1
          fi
          cp "$ffmpeg_dir/ffmpeg" src-tauri/bin/ffmpeg-x86_64-unknown-linux-gnu
          chmod +x src-tauri/bin/ffmpeg-x86_64-unknown-linux-gnu

      - name: Build and draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseDraft: true
